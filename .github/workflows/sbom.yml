name: Generate SBOM

on:
  push:
    branches: [main, develop]
    paths:
      - 'composer.json'
      - 'composer.lock'
      - 'package.json'
      - 'package-lock.json'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sbom-php:
    name: Generate PHP SBOM
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: write
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2.37.2
        with:
          php-version: '8.4'
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Generate CycloneDX SBOM (JSON)
        run: composer sbom

      - name: Generate CycloneDX SBOM (XML)
        run: composer sbom:xml

      - name: Run security audit
        run: composer security:audit
        continue-on-error: true

      - name: Upload PHP SBOM artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sbom-php
          path: |
            sbom.cdx.json
            sbom.cdx.xml
            security-audit.json
          retention-days: 90

      - name: Upload SBOM to GitHub Security
        if: github.event_name == 'release'
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          sarif_file: sbom.cdx.json
        continue-on-error: true

  sbom-npm:
    name: Generate npm SBOM
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate CycloneDX SBOM (JSON)
        run: npm run sbom

      - name: Generate CycloneDX SBOM (XML)
        run: npm run sbom:xml

      - name: Run security audit
        run: npm run security:audit
        continue-on-error: true

      - name: Upload npm SBOM artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sbom-npm
          path: |
            sbom.npm.cdx.json
            sbom.npm.cdx.xml
            security-audit.npm.json
          retention-days: 90

  combine-sboms:
    name: Combine SBOMs
    needs: [sbom-php, sbom-npm]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    if: github.event_name == 'release'
    permissions:
      contents: write
    steps:
      - name: Download PHP SBOM
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: sbom-php
          path: sboms/php

      - name: Download npm SBOM
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: sbom-npm
          path: sboms/npm

      - name: Create combined SBOM package
        run: |
          mkdir -p release-sbom
          cp sboms/php/*.json release-sbom/
          cp sboms/php/*.xml release-sbom/
          cp sboms/npm/*.json release-sbom/
          cp sboms/npm/*.xml release-sbom/
          cd release-sbom && zip -r ../sbom-${{ github.ref_name }}.zip .

      - name: Upload to release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          files: sbom-${{ github.ref_name }}.zip
