version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"

  # PHP (plugin dev tooling)
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "php"
    groups:
      composer:
        update-types:
          - "minor"
          - "patch"

  # PHP (end-to-end test harness)
  - package-ecosystem: "composer"
    directory: "/tests/e2e"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "php"
    groups:
      composer:
        update-types:
          - "minor"
          - "patch"

  # JavaScript build tooling
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "javascript"
    groups:
      npm:
        update-types:
          - "minor"
          - "patch"

  # Compose stack
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "docker"
    groups:
      docker:
        update-types:
          - "minor"
          - "patch"

  # End-to-end test image
  - package-ecosystem: "docker"
    directory: "/tests/e2e"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "docker"
    groups:
      docker:
        update-types:
          - "minor"
          - "patch"
